version: "3.9"

# ── Shared config ─────────────────────────────────────────────────────────────
x-api-common: &api-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file: .env
  environment:
    DATABASE_URL: postgresql://glancefive:${POSTGRES_PASSWORD}@db:5432/glancefive
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/1
    CELERY_RESULT_URL: redis://redis:6379/2
    ENVIRONMENT: production
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: glancefive
      POSTGRES_USER: glancefive
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glancefive"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── API (FastAPI + uvicorn) ──────────────────────────────────────────────────
  api:
    <<: *api-common
    command: >
      sh -c "alembic upgrade head &&
             python seed.py &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Celery worker ─────────────────────────────────────────────────────────────
  worker:
    <<: *api-common
    command: celery -A celery_app.celery_app worker --loglevel=info --concurrency=2 -Q default
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Celery beat (scheduler) ──────────────────────────────────────────────────
  beat:
    <<: *api-common
    command: celery -A celery_app.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    volumes:
      - beat_data:/app/celerybeat-schedule

  # ── Flower (Celery monitoring) ────────────────────────────────────────────────
  flower:
    <<: *api-common
    command: celery -A celery_app.celery_app flower --url-prefix=/flower --port=5555
    expose:
      - "5555"
    environment:
      DATABASE_URL: postgresql://glancefive:${POSTGRES_PASSWORD}@db:5432/glancefive
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_URL: redis://redis:6379/2
      ENVIRONMENT: production
      FLOWER_BASIC_AUTH: ${FLOWER_USER:-admin}:${FLOWER_PASSWORD}

  # ── Frontend (nginx serving Vite build) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    restart: unless-stopped

  # ── Nginx (reverse proxy + TLS termination) ───────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  beat_data:
